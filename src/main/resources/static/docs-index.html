<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMA API Documentation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f6f8fa;
    color: #24292f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 640px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .subtitle {
    color: #57606a;
    font-size: 16px;
    margin-bottom: 40px;
  }
  .cards {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .card {
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 12px;
    padding: 32px 28px;
    width: 280px;
    text-decoration: none;
    color: inherit;
    transition: all .2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .card:hover {
    border-color: #888;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
    transform: translateY(-2px);
  }
  .card-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-movies .card-icon {
    background: #dafbe1;
  }
  .card-beskar .card-icon {
    background: #fff3cd;
  }
  .card h2 {
    font-size: 20px;
    font-weight: 700;
  }
  .card-movies h2 { color: #1a7f37; }
  .card-beskar h2 { color: #b8860b; }
  .card p {
    color: #57606a;
    font-size: 14px;
    line-height: 1.5;
  }
  .card .badge {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .card-movies .badge {
    background: #dafbe1;
    color: #1a7f37;
  }
  .card-beskar .badge {
    background: #fff3cd;
    color: #b8860b;
  }
  @media (max-width: 620px) {
    .cards { flex-direction: column; align-items: center; }
    h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>RMA API Documentation</h1>
  <p class="subtitle">Faculty of Computing, Union University Belgrade</p>
  <div class="cards">
    <a href="/movies/docs" class="card card-movies">
      <div class="card-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1a7f37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M10 8l6 4-6 4V8z"/></svg>
      </div>
      <h2>Movies API</h2>
      <p>1,000 popular movies with cast, images, videos, genres, and collections.</p>
      <span class="badge">GET only</span>
    </a>
    <a href="/beskar/docs" class="card card-beskar">
      <div class="card-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#b8860b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <h2>Beskar API</h2>
      <p>11,200 astronomy entries with reactions, comments, collections, and categories.</p>
      <span class="badge">Full CRUD</span>
    </a>
  </div>
</div>
</body>
</html>
